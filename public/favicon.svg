<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#111827" />
  
  <!-- Enlarged Scale -->
  <g fill="#ffffff" stroke="#ffffff" stroke-linejoin="round">
    
    <!-- Center pillar -->
    <line x1="50" y1="30" x2="50" y2="80" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Base -->
    <line x1="38" y1="83" x2="62" y2="83" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Balance beam (tilted, wider span) -->
    <line x1="18" y1="38" x2="82" y2="26" stroke-width="4.5" stroke-linecap="round" />
    
    <!-- Left pan strings -->
    <line x1="20" y1="38" x2="10" y2="60" stroke-width="2.5" stroke-linecap="round" />
    <line x1="20" y1="38" x2="30" y2="60" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Right pan strings -->
    <line x1="80" y1="26" x2="70" y2="48" stroke-width="2.5" stroke-linecap="round" />
    <line x1="80" y1="26" x2="90" y2="48" stroke-width="2.5" stroke-linecap="round" />
    
    <!-- Pivot -->
    <circle cx="50" cy="32" r="5" stroke="none" />
    
    <!-- Left pan -->
    <path d="M 8 60 A 12 12 0 0 0 32 60 Z" stroke="none" />
    
    <!-- Right pan -->
    <path d="M 68 48 A 12 12 0 0 0 92 48 Z" stroke="none" />
    
  </g>
</svg>